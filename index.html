<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kiki's PlayPlace</title>
  <style>
    body {
      margin: 0;
      background: #000;
      overflow: hidden;
      font-family: monospace;
      color: white;
    }

    #game {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #view {
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
    }

    #dialogue {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      font-size: 20px;
    }
  </style>
</head>
<body>

<div id="game">
  <div id="view"></div>
  <div id="dialogue">Use WASD to move.</div>
</div>

<script>
  // First-person rooms
  const rooms = {
    "start": "url('rooms/start.png')",
    "hall1": "url('rooms/hallway.png')",
    "kiki": "url('characters/kiki.png')",
    "genevieve": "url('characters/genevieve.png')"
  };

  let currentRoom = "start";

  function updateView() {
    document.getElementById("view").style.backgroundImage = rooms[currentRoom];
  }

  updateView();

  document.addEventListener("keydown", (e) => {
    if (e.key === "w") currentRoom = "hall1";
    if (e.key === "a") currentRoom = "kiki";
    if (e.key === "d") currentRoom = "genevieve";
    if (e.key === "s") currentRoom = "start";

    updateView();

    if (currentRoom === "kiki") {
      dialogue.textContent = "Kiki: “Ribbit-ribbit… my taco is smiling at you.”";
    } else if (currentRoom === "genevieve") {
      dialogue.textContent = "Genevieve: “Waddle-waddle… something’s wrong in the PlayPlace.”";
    } else {
      dialogue.textContent = "Use WASD to move.";
    }
  });
</script>

</body>
</html>
