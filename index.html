<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kiki's PlayPlace – Office Start</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: monospace; }
    #dialogue {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>
<div id="dialogue">You’re in the office. WASD to move, mouse to look.</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script>
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);
  scene.fog = new THREE.Fog(0x000000, 5, 80);

  const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );
  camera.position.set(0, 1.5, 5);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const ambient = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambient);

  const officeLight = new THREE.PointLight(0xffffaa, 1.5, 30);
  officeLight.position.set(0, 4, 0);
  scene.add(officeLight);

  const horrorLight = new THREE.PointLight(0xff0000, 2.5, 40);
  horrorLight.position.set(0, 4, -25);
  scene.add(horrorLight);

  setInterval(() => {
    horrorLight.intensity = 1 + Math.random() * 2;
  }, 120);

  // OFFICE (start room)
  function makeOffice() {
    const group = new THREE.Group();

    function wall(w, h, color) {
      const geo = new THREE.BoxGeometry(w, h, 0.2);
      const mat = new THREE.MeshBasicMaterial({ color });
      return new THREE.Mesh(geo, mat);
    }

    const floorGeo = new THREE.PlaneGeometry(12, 12);
    const floorMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    group.add(floor);

    const backWall = wall(12, 4, 0x333366);
    backWall.position.set(0, 2, -6);
    group.add(backWall);

    const leftWall = wall(12, 4, 0x333333);
    leftWall.rotation.y = Math.PI / 2;
    leftWall.position.set(-6, 2, 0);
    group.add(leftWall);

    const rightWall = wall(12, 4, 0x333333);
    rightWall.rotation.y = Math.PI / 2;
    rightWall.position.set(6, 2, 0);
    group.add(rightWall);

    const deskGeo = new THREE.BoxGeometry(4, 0.5, 2);
    const deskMat = new THREE.MeshBasicMaterial({ color: 0x553322 });
    const desk = new THREE.Mesh(deskGeo, deskMat);
    desk.position.set(0, 1, 2);
    group.add(desk);

    const monitorGeo = new THREE.BoxGeometry(1.5, 1, 0.1);
    const monitorMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
    const monitor = new THREE.Mesh(monitorGeo, monitorMat);
    monitor.position.set(0, 2, 1.2);
    group.add(monitor);

    group.position.set(0, 0, 0);
    return group;
  }

  const office = makeOffice();
  scene.add(office);

  // PLAYPLACE TUNNEL ENTRANCE
  function makeTunnelEntrance() {
    const geo = new THREE.BoxGeometry(8, 4, 0.5);
    const mat = new THREE.MeshBasicMaterial({ color: 0xffcc33 });
    const arch = new THREE.Mesh(geo, mat);
    arch.position.set(0, 2, -8);
    return arch;
  }

  const tunnelEntrance = makeTunnelEntrance();
  scene.add(tunnelEntrance);

  // LINE-STYLE TUNNELS (colourful, PlayPlace-coded)
  const tunnels = new THREE.Group();

  function lineBox(w, h, d, color) {
    const geo = new THREE.BoxGeometry(w, h, d);
    const edges = new THREE.EdgesGeometry(geo);
    const mat = new THREE.LineBasicMaterial({ color });
    return new THREE.LineSegments(edges, mat);
  }

  function addTunnelSegment(x, z, length, rotation, color) {
    const seg = lineBox(6, 4, length, color);
    seg.position.set(x, 2, z);
    seg.rotation.y = rotation;
    tunnels.add(seg);
  }

  addTunnelSegment(0, -18, 20, 0, 0xffcc33);   // yellow
  addTunnelSegment(-10, -28, 20, Math.PI / 2, 0x33aaff); // blue
  addTunnelSegment(10, -28, 20, Math.PI / 2, 0xff66aa);  // pink
  addTunnelSegment(0, -38, 20, 0, 0x66ff66);   // green
  addTunnelSegment(0, -58, 20, 0, 0xffcc33);   // yellow again

  scene.add(tunnels);

  // KIKI – animatronic frog with seams, NO gore
  function createKiki() {
    const group = new THREE.Group();

    const bodyMat = new THREE.MeshBasicMaterial({ color: 0x4bd35a });
    const seamMat = new THREE.MeshBasicMaterial({ color: 0x1f7a2f });

    const torso = new THREE.Mesh(new THREE.BoxGeometry(1.8, 2.4, 1.2), bodyMat);
    group.add(torso);

    const torsoSeam = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.05, 1.25), seamMat);
    torsoSeam.position.y = 0.4;
    group.add(torsoSeam);

    const head = new THREE.Mesh(new THREE.SphereGeometry(1.1, 32, 32), bodyMat);
    head.position.y = 2.3;
    group.add(head);

    const headSeam = new THREE.Mesh(new THREE.BoxGeometry(0.05, 1.8, 1.6), seamMat);
    headSeam.position.set(0, 2.3, 0);
    group.add(headSeam);

    const eyeWhiteGeo = new THREE.SphereGeometry(0.25, 16, 16);
    const eyeWhiteMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const pupilGeo = new THREE.SphereGeometry(0.12, 16, 16);
    const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });

    const leftEyeWhite = new THREE.Mesh(eyeWhiteGeo, eyeWhiteMat);
    const rightEyeWhite = new THREE.Mesh(eyeWhiteGeo, eyeWhiteMat);
    leftEyeWhite.position.set(-0.4, 2.7, 0.7);
    rightEyeWhite.position.set(0.4, 2.7, 0.7);
    group.add(leftEyeWhite);
    group.add(rightEyeWhite);

    const leftPupil = new THREE.Mesh(pupilGeo, pupilMat);
    const rightPupil = new THREE.Mesh(pupilGeo, pupilMat);
    leftPupil.position.set(-0.4, 2.7, 0.9);
    rightPupil.position.set(0.4, 2.7, 0.9);
    group.add(leftPupil);
    group.add(rightPupil);

    const hatBrim = new THREE.Mesh(
      new THREE.CylinderGeometry(1.4, 1.4, 0.15, 24),
      new THREE.MeshBasicMaterial({ color: 0xffcc00 })
    );
    hatBrim.position.y = 3.1;
    group.add(hatBrim);

    const hatTop = new THREE.Mesh(
      new THREE.ConeGeometry(1, 1, 24),
      new THREE.MeshBasicMaterial({ color: 0xffcc00 })
    );
    hatTop.position.y = 3.6;
    group.add(hatTop);

    const taco = new THREE.Mesh(
      new THREE.SphereGeometry(0.6, 32, 32, 0, Math.PI),
      new THREE.MeshBasicMaterial({ color: 0xffaa33 })
    );
    taco.position.set(0, 1.1, 1.1);
    group.add(taco);

    group.position.set(-3, 0, -22);
    return group;
  }

  // GENEVIEVE – animatronic penguin with seams + pupils
  function createGenevieve() {
    const group = new THREE.Group();

    const bodyMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
    const seamMat = new THREE.MeshBasicMaterial({ color: 0x222222 });

    const body = new THREE.Mesh(new THREE.SphereGeometry(1.5, 32, 32), bodyMat);
    group.add(body);

    const belly = new THREE.Mesh(
      new THREE.SphereGeometry(1.2, 32, 32),
      new THREE.MeshBasicMaterial({ color: 0xffffff })
    );
    belly.position.z = 0.5;
    group.add(belly);

    const bellySeam = new THREE.Mesh(new THREE.BoxGeometry(0.05, 1.8, 1.4), seamMat);
    bellySeam.position.set(0, 0, 0.4);
    group.add(bellySeam);

    const head = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 32), bodyMat);
    head.position.y = 2;
    group.add(head);

    const headSeam = new THREE.Mesh(new THREE.BoxGeometry(0.05, 1.6, 1.4), seamMat);
    headSeam.position.set(0, 2, 0);
    group.add(headSeam);

    const eyeWhiteGeo = new THREE.SphereGeometry(0.2, 16, 16);
    const eyeWhiteMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const pupilGeo = new THREE.SphereGeometry(0.1, 16, 16);
    const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });

    const leftEyeWhite = new THREE.Mesh(eyeWhiteGeo, eyeWhiteMat);
    const rightEyeWhite = new THREE.Mesh(eyeWhiteGeo, eyeWhiteMat);
    leftEyeWhite.position.set(-0.35, 2.4, 0.7);
    rightEyeWhite.position.set(0.35, 2.4, 0.7);
    group.add(leftEyeWhite);
    group.add(rightEyeWhite);

    const leftPupil = new THREE.Mesh(pupilGeo, pupilMat);
    const rightPupil = new THREE.Mesh(pupilGeo, pupilMat);
    leftPupil.position.set(-0.35, 2.4, 0.9);
    rightPupil.position.set(0.35, 2.4, 0.9);
    group.add(leftPupil);
    group.add(rightPupil);

    const beak = new THREE.Mesh(
      new THREE.ConeGeometry(0.4, 0.8, 24),
      new THREE.MeshBasicMaterial({ color: 0xffaa00 })
    );
    beak.position.set(0, 2.1, 1);
    group.add(beak);

    const footGeo = new THREE.BoxGeometry(0.6, 0.2, 1);
    const footMat = new THREE.MeshBasicMaterial({ color: 0xff8800 });
    const leftFoot = new THREE.Mesh(footGeo, footMat);
    const rightFoot = new THREE.Mesh(footGeo, footMat);
    leftFoot.position.set(-0.6, -1.5, 0.3);
    rightFoot.position.set(0.6, -1.5, 0.3);
    group.add(leftFoot);
    group.add(rightFoot);

    group.position.set(3, 0, -22);
    return group;
  }

  const kiki = createKiki();
  const genevieve = createGenevieve();
  scene.add(kiki);
  scene.add(genevieve);

  const dialogueBox = document.getElementById('dialogue');

  const kikiLines = [
    "Kiki: “Ribbit… office feels safer, doesn’t it?”",
    "Kiki: “You’re not supposed to see the tunnels yet.”",
    "Kiki: “If the lights flicker, don’t stop moving.”"
  ];

  const genevieveLines = [
    "Genevieve: “Sweetheart… the office doesn’t keep you safe forever.”",
    "Genevieve: “The PlayPlace opens when you’re ready or when it’s ready.”",
    "Genevieve: “Don’t stare at us too long.”"
  ];

  // Movement + mouse look
  let yaw = 0, pitch = 0;
  let pointerLocked = false;
  const keys = {};

  document.addEventListener('keydown', e => { keys[e.key] = true; });
  document.addEventListener('keyup', e => { keys[e.key] = false; });

  document.body.addEventListener('click', () => {
    if (!pointerLocked && renderer.domElement.requestPointerLock) {
      renderer.domElement.requestPointerLock();
    }
  });

  document.addEventListener('pointerlockchange', () => {
    pointerLocked = (document.pointerLockElement === renderer.domElement);
  });

  document.addEventListener('mousemove', e => {
    if (!pointerLocked) return;
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-Math.PI / 2 + 0.1, Math.min(Math.PI / 2 - 0.1, pitch));
  });

  function updateCameraDirection() {
    const dir = new THREE.Vector3(
      Math.sin(yaw) * Math.cos(pitch),
      Math.sin(pitch),
      Math.cos(yaw) * Math.cos(pitch)
    );
    camera.lookAt(camera.position.clone().add(dir));
    return dir;
  }

  // Mascot stare
  function makeStare(target, speed = 0.01) {
    target.lookAt(camera.position);
    target.rotation.y += speed;
  }

  const raycaster = new THREE.Raycaster();

  function checkLookAtMascots() {
    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    raycaster.set(camera.position, dir);
    const intersects = raycaster.intersectObjects([kiki, genevieve], true);

    if (intersects.length > 0) {
      let parent = intersects[0].object;
      while (parent.parent && parent.parent !== scene) parent = parent.parent;

      if (parent === kiki) {
        dialogueBox.textContent = kikiLines[Math.floor(Math.random() * kikiLines.length)];
      } else if (parent === genevieve) {
        dialogueBox.textContent = genevieveLines[Math.floor(Math.random() * genevieveLines.length)];
      }
    } else {
      dialogueBox.textContent = "You’re in the office. WASD to move, mouse to look. The tunnels are waiting.";
    }
  }

  function animate() {
    requestAnimationFrame(animate);

    const dir = updateCameraDirection();
    const forward = new THREE.Vector3(dir.x, 0, dir.z).normalize();
    const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

    let velX = 0, velZ = 0;

    if (keys['w']) {
      velX += forward.x * 0.1;
      velZ += forward.z * 0.1;
    }
    if (keys['s']) {
      velX -= forward.x * 0.1;
      velZ -= forward.z * 0.1;
    }
    if (keys['a']) {
      velX -= right.x * 0.1;
      velZ -= right.z * 0.1;
    }
    if (keys['d']) {
      velX += right.x * 0.1;
      velZ += right.z * 0.1;
    }

    camera.position.x += velX;
    camera.position.z += velZ;

    makeStare(kiki);
    makeStare(genevieve);

    checkLookAtMascots();

    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
