<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kiki's PlayPlace</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: monospace; }
    #dialogue {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
<div id="dialogue">Use WASD to move. Look at Kiki or Vivi.</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script>
  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050505);
  scene.fog = new THREE.Fog(0x110000, 5, 50);

  const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );
  camera.position.set(0, 1.5, 0);

  const renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const ambient = new THREE.AmbientLight(0xffffff, 0.3);
  scene.add(ambient);

  // Horror red light
  const horrorLight = new THREE.PointLight(0xff0000, 2, 20);
  horrorLight.position.set(0, 5, -15);
  scene.add(horrorLight);

  setInterval(() => {
    horrorLight.intensity = 0.5 + Math.random() * 2.5;
  }, 80);

  // Floor
  const floorGeo = new THREE.PlaneGeometry(100, 100);
  const floorMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  scene.add(floor);

  // KIKI (frog animatronic)
  function createKiki() {
    const group = new THREE.Group();

    const body = new THREE.Mesh(
      new THREE.BoxGeometry(2, 3, 1),
      new THREE.MeshBasicMaterial({ color: 0x55ff55 })
    );
    group.add(body);

    const head = new THREE.Mesh(
      new THREE.SphereGeometry(1.2, 32, 32),
      new THREE.MeshBasicMaterial({ color: 0x55ff55 })
    );
    head.position.y = 2.5;
    group.add(head);

    const eyeGeo = new THREE.SphereGeometry(0.25, 16, 16);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
    leftEye.position.set(-0.5, 3.2, 0.8);
    rightEye.position.set(0.5, 3.2, 0.8);
    group.add(leftEye);
    group.add(rightEye);

    const brim = new THREE.Mesh(
      new THREE.CylinderGeometry(1.5, 1.5, 0.2, 32),
      new THREE.MeshBasicMaterial({ color: 0xffcc00 })
    );
    brim.position.y = 3.7;
    group.add(brim);

    const hatTop = new THREE.Mesh(
      new THREE.ConeGeometry(1, 1, 32),
      new THREE.MeshBasicMaterial({ color: 0xffcc00 })
    );
    hatTop.position.y = 4.2;
    group.add(hatTop);

    const taco = new THREE.Mesh(
      new THREE.SphereGeometry(0.7, 32, 32, 0, Math.PI),
      new THREE.MeshBasicMaterial({ color: 0xffaa33 })
    );
    taco.position.set(0, 1, 1.2);
    group.add(taco);

    group.position.set(-3, 0, -10);
    return group;
  }

  // VIVI (Genevieve the penguin)
  function createVivi() {
    const group = new THREE.Group();

    const body = new THREE.Mesh(
      new THREE.SphereGeometry(1.5, 32, 32),
      new THREE.MeshBasicMaterial({ color: 0x000000 })
    );
    group.add(body);

    const belly = new THREE.Mesh(
      new THREE.SphereGeometry(1.2, 32, 32),
      new THREE.MeshBasicMaterial({ color: 0xffffff })
    );
    belly.position.z = 0.5;
    group.add(belly);

    const head = new THREE.Mesh(
      new THREE.SphereGeometry(1, 32, 32),
      new THREE.MeshBasicMaterial({ color: 0x000000 })
    );
    head.position.y = 2;
    group.add(head);

    const eyeGeo = new THREE.SphereGeometry(0.2, 16, 16);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
    leftEye.position.set(-0.4, 2.4, 0.7);
    rightEye.position.set(0.4, 2.4, 0.7);
    group.add(leftEye);
    group.add(rightEye);

    const beak = new THREE.Mesh(
      new THREE.ConeGeometry(0.4, 0.8, 32),
      new THREE.MeshBasicMaterial({ color: 0xffaa00 })
    );
    beak.position.set(0, 2.1, 1);
    group.add(beak);

    const footGeo = new THREE.BoxGeometry(0.6, 0.2, 1);
    const footMat = new THREE.MeshBasicMaterial({ color: 0xff8800 });
    const leftFoot = new THREE.Mesh(footGeo, footMat);
    const rightFoot = new THREE.Mesh(footGeo, footMat);
    leftFoot.position.set(-0.6, -1.5, 0.3);
    rightFoot.position.set(0.6, -1.5, 0.3);
    group.add(leftFoot);
    group.add(rightFoot);

    group.position.set(3, 0, -10);
    return group;
  }

  const kiki = createKiki();
  const vivi = createVivi();
  scene.add(kiki);
  scene.add(vivi);

  // Ominous tunnel
  const tunnelGeo = new THREE.BoxGeometry(20, 5, 60);
  const tunnelMat = new THREE.MeshBasicMaterial({ color: 0x220000 });
  const tunnel = new THREE.Mesh(tunnelGeo, tunnelMat);
  tunnel.position.set(0, 0, -40);
  scene.add(tunnel);

  const dialogueBox = document.getElementById('dialogue');

  const kikiLines = [
    "Kiki: “Ribbit… my taco is still smiling at you.”",
    "Kiki: “Don’t stay in the tunnels too long…”",
    "Kiki: “Vivi says the lights flicker for a reason.”"
  ];

  const viviLines = [
    "Genevieve: “Waddle-waddle… something’s wrong in the tunnels.”",
    "Genevieve: “Sweetheart… don’t turn around if you hear giggling.”",
    "Genevieve: “Only Kiki calls me Vivi.”"
  ];

  let x = 0, z = 0;

  document.addEventListener('keydown', (e) => {
    if (e.key === 'w') z -= 0.2;
    if (e.key === 's') z += 0.2;
    if (e.key === 'a') x -= 0.2;
    if (e.key === 'd') x += 0.2;

    camera.position.x = x;
    camera.position.z = z;

    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);

    const raycaster = new THREE.Raycaster(camera.position, dir);
    const intersects = raycaster.intersectObjects([kiki, vivi], true);

    if (intersects.length > 0) {
      const obj = intersects[0].object.parent;
      if (obj === kiki) {
        dialogueBox.textContent = kikiLines[Math.floor(Math.random() * kikiLines.length)];
      } else if (obj === vivi) {
        dialogueBox.textContent = viviLines[Math.floor(Math.random() * viviLines.length)];
      }
    } else {
      dialogueBox.textContent = "Use WASD to move. Look at Kiki or Genevieve.";
    }
  });

  // Corrupt material helper
  function corruptMaterial(color) {
    return new THREE.MeshBasicMaterial({
      color,
      wireframe: true,
      transparent: true,
      opacity: 0.6
    });
  }

  // Corrupt Kiki slightly
  kiki.children.forEach(part => {
    part.material = corruptMaterial(0x880000);
  });

  // Mascot stare behavior
  function makeStare(target, speed = 0.02) {
    target.lookAt(camera.position);
    target.rotation.y += speed;
  }

  function animate() {
    requestAnimationFrame(animate);

    makeStare(kiki);
    makeStare(vivi);

    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
