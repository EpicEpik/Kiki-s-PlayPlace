<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kiki's PlayPlace</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: monospace; }
    #dialogue {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
<div id="dialogue">Use WASD to move. Look at Kiki or Genevieve.</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script>
  // Basic Three.js setup
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Light
  const light = new THREE.AmbientLight(0xffffff, 1);
  scene.add(light);

  // Kiki & Genevieve textures (you must add these files)
  const loader = new THREE.TextureLoader();
  const kikiTexture = loader.load('kiki.png');
  const genevieveTexture = loader.load('genevieve.png');

  const materialKiki = new THREE.MeshBasicMaterial({ map: kikiTexture, transparent: true });
  const materialGen = new THREE.MeshBasicMaterial({ map: genevieveTexture, transparent: true });

  const geometry = new THREE.PlaneGeometry(2, 3);

  const kiki = new THREE.Mesh(geometry, materialKiki);
  kiki.position.set(-2, 0, -5);
  scene.add(kiki);

  const genevieve = new THREE.Mesh(geometry, materialGen);
  genevieve.position.set(2, 0, -5);
  scene.add(genevieve);

  camera.position.z = 0;

  const dialogueBox = document.getElementById('dialogue');

  const kikiLines = [
    "Kiki: “Ribbit-ribbit… my taco is smiling at you.”",
    "Kiki: “You’re not supposed to be in the PlayPlace after closing…”",
    "Kiki: “If the music stops, don’t turn around.”"
  ];

  const genLines = [
    "Genevieve: “Waddle-waddle… something’s wrong in the tunnels.”",
    "Genevieve: “If the lights flicker, pretend you didn’t see it.”",
    "Genevieve: “I think Kiki’s smile is stuck again…”"
  ];

  let x = 0, z = 0;

  document.addEventListener('keydown', (e) => {
    if (e.key === 'w') z -= 0.2;
    if (e.key === 's') z += 0.2;
    if (e.key === 'a') x -= 0.2;
    if (e.key === 'd') x += 0.2;

    camera.position.x = x;
    camera.position.z = z;

    // Simple "look at" detection
    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);

    // Raycast forward
    const raycaster = new THREE.Raycaster(camera.position, dir);
    const intersects = raycaster.intersectObjects([kiki, genevieve]);

    if (intersects.length > 0) {
      const obj = intersects[0].object;
      if (obj === kiki) {
        dialogueBox.textContent = kikiLines[Math.floor(Math.random() * kikiLines.length)];
      } else if (obj === genevieve) {
        dialogueBox.textContent = genLines[Math.floor(Math.random() * genLines.length)];
      }
    } else {
      dialogueBox.textContent = "Use WASD to move. Look at Kiki or Genevieve.";
    }
  });

  function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
