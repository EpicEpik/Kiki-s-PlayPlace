<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kiki's PlayPlace – Line Horror</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: monospace; }
    #dialogue {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>
<div id="dialogue">WASD to move. Mouse to look. Don’t stay in the tunnels.</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script>
  // Scene
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);
  scene.fog = new THREE.Fog(0x220000, 5, 60);

  const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );
  camera.position.set(0, 1.5, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Lights
  const ambient = new THREE.AmbientLight(0xff0000, 0.2);
  scene.add(ambient);

  const horrorLight = new THREE.PointLight(0xff0000, 3, 40);
  horrorLight.position.set(0, 5, -20);
  scene.add(horrorLight);

  setInterval(() => {
    horrorLight.intensity = 1 + Math.random() * 3;
  }, 90);

  // Helper: line box
  function makeLineBox(w, h, d, color = 0xff0000) {
    const geo = new THREE.BoxGeometry(w, h, d);
    const edges = new THREE.EdgesGeometry(geo);
    const mat = new THREE.LineBasicMaterial({ color });
    return new THREE.LineSegments(edges, mat);
  }

  // Floor (line grid)
  const floorLines = new THREE.Group();
  for (let x = -50; x <= 50; x += 5) {
    const geo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(x, 0, -50),
      new THREE.Vector3(x, 0, 50)
    ]);
    const mat = new THREE.LineBasicMaterial({ color: 0x330000 });
    floorLines.add(new THREE.Line(geo, mat));
  }
  for (let z = -50; z <= 50; z += 5) {
    const geo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-50, 0, z),
      new THREE.Vector3(50, 0, z)
    ]);
    const mat = new THREE.LineBasicMaterial({ color: 0x330000 });
    floorLines.add(new THREE.Line(geo, mat));
  }
  scene.add(floorLines);

  // Tunnels (line maze)
  const tunnels = new THREE.Group();

  function addTunnelSegment(x, z, length, rotation = 0) {
    const seg = makeLineBox(6, 4, length, 0xff0000);
    seg.position.set(x, 2, z);
    seg.rotation.y = rotation;
    tunnels.add(seg);
  }

  // Simple maze layout
  addTunnelSegment(0, -15, 20);
  addTunnelSegment(-10, -25, 20, Math.PI / 2);
  addTunnelSegment(10, -25, 20, Math.PI / 2);
  addTunnelSegment(0, -35, 20);
  addTunnelSegment(0, -55, 20);
  addTunnelSegment(-10, -45, 20, Math.PI / 2);
  addTunnelSegment(10, -45, 20, Math.PI / 2);

  scene.add(tunnels);

  // Kiki (wireframe frog)
  function createKiki() {
    const group = new THREE.Group();

    function wireSphere(r, color) {
      const geo = new THREE.SphereGeometry(r, 16, 16);
      const edges = new THREE.EdgesGeometry(geo);
      const mat = new THREE.LineBasicMaterial({ color });
      return new THREE.LineSegments(edges, mat);
    }

    function wireBox(w, h, d, color) {
      const geo = new THREE.BoxGeometry(w, h, d);
      const edges = new THREE.EdgesGeometry(geo);
      const mat = new THREE.LineBasicMaterial({ color });
      return new THREE.LineSegments(edges, mat);
    }

    const body = wireBox(2, 3, 1, 0xff0000);
    group.add(body);

    const head = wireSphere(1.2, 0xff0000);
    head.position.y = 2.5;
    group.add(head);

    const hat = makeLineBox(2.5, 1, 2.5, 0xff8800);
    hat.position.y = 3.7;
    group.add(hat);

    const taco = wireSphere(0.7, 0xffaa33);
    taco.position.set(0, 1, 1.2);
    group.add(taco);

    group.position.set(-4, 0, -18);
    return group;
  }

  // Genevieve (penguin, solid but simple)
  function createGenevieve() {
    const group = new THREE.Group();

    const body = new THREE.Mesh(
      new THREE.SphereGeometry(1.5, 32, 32),
      new THREE.MeshBasicMaterial({ color: 0x000000 })
    );
    group.add(body);

    const belly = new THREE.Mesh(
      new THREE.SphereGeometry(1.2, 32, 32),
      new THREE.MeshBasicMaterial({ color: 0xffffff })
    );
    belly.position.z = 0.5;
    group.add(belly);

    const head = new THREE.Mesh(
      new THREE.SphereGeometry(1, 32, 32),
      new THREE.MeshBasicMaterial({ color: 0x000000 })
    );
    head.position.y = 2;
    group.add(head);

    const eyeGeo = new THREE.SphereGeometry(0.2, 16, 16);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
    leftEye.position.set(-0.4, 2.4, 0.7);
    rightEye.position.set(0.4, 2.4, 0.7);
    group.add(leftEye);
    group.add(rightEye);

    const beak = new THREE.Mesh(
      new THREE.ConeGeometry(0.4, 0.8, 32),
      new THREE.MeshBasicMaterial({ color: 0xffaa00 })
    );
    beak.position.set(0, 2.1, 1);
    group.add(beak);

    const footGeo = new THREE.BoxGeometry(0.6, 0.2, 1);
    const footMat = new THREE.MeshBasicMaterial({ color: 0xff8800 });
    const leftFoot = new THREE.Mesh(footGeo, footMat);
    const rightFoot = new THREE.Mesh(footGeo, footMat);
    leftFoot.position.set(-0.6, -1.5, 0.3);
    rightFoot.position.set(0.6, -1.5, 0.3);
    group.add(leftFoot);

    group.position.set(4, 0, -18);
    return group;
  }

  const kiki = createKiki();
  const genevieve = createGenevieve();
  scene.add(kiki);
  scene.add(genevieve);

  const dialogueBox = document.getElementById('dialogue');

  const kikiLines = [
    "Kiki: “Ribbit… the tunnels like you.”",
    "Kiki: “Don’t stop walking. The lines get closer.”",
    "Kiki: “The red light means we’re awake.”"
  ];

  const genevieveLines = [
    "Genevieve: “Sweetheart… you shouldn’t be in the tunnels.”",
    "Genevieve: “The walls remember more than you do.”",
    "Genevieve: “If the lines move, don’t look back.”"
  ];

  // Movement
  let velX = 0, velZ = 0;
  const keys = {};

  document.addEventListener('keydown', e => { keys[e.key] = true; });
  document.addEventListener('keyup', e => { keys[e.key] = false; });

  // Mouse look
  let yaw = 0, pitch = 0;
  let pointerLocked = false;

  document.body.addEventListener('click', () => {
    if (!pointerLocked && renderer.domElement.requestPointerLock) {
      renderer.domElement.requestPointerLock();
    }
  });

  document.addEventListener('pointerlockchange', () => {
    pointerLocked = (document.pointerLockElement === renderer.domElement);
  });

  document.addEventListener('mousemove', e => {
    if (!pointerLocked) return;
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-Math.PI / 2 + 0.1, Math.min(Math.PI / 2 - 0.1, pitch));
  });

  function updateCameraDirection() {
    const dir = new THREE.Vector3(
      Math.sin(yaw) * Math.cos(pitch),
      Math.sin(pitch),
      Math.cos(yaw) * Math.cos(pitch)
    );
    camera.lookAt(camera.position.clone().add(dir));
    return dir;
  }

  // Mascot stare
  function makeStare(target, speed = 0.02) {
    target.lookAt(camera.position);
    target.rotation.y += speed;
  }

  // Raycast for dialogue
  const raycaster = new THREE.Raycaster();

  function checkLookAtMascots() {
    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    raycaster.set(camera.position, dir);
    const intersects = raycaster.intersectObjects([kiki, genevieve], true);

    if (intersects.length > 0) {
      const root = intersects[0].object;
      let parent = root;
      while (parent.parent && parent.parent !== scene) parent = parent.parent;

      if (parent === kiki) {
        dialogueBox.textContent = kikiLines[Math.floor(Math.random() * kikiLines.length)];
      } else if (parent === genevieve) {
        dialogueBox.textContent = genevieveLines[Math.floor(Math.random() * genevieveLines.length)];
      }
    } else {
      dialogueBox.textContent = "WASD to move. Mouse to look. The tunnels don’t like you standing still.";
    }
  }

  // Animate
  function animate() {
    requestAnimationFrame(animate);

    const dir = updateCameraDirection();

    const forward = new THREE.Vector3(dir.x, 0, dir.z).normalize();
    const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

    velX = 0;
    velZ = 0;

    if (keys['w']) {
      velX += forward.x * 0.1;
      velZ += forward.z * 0.1;
    }
    if (keys['s']) {
      velX -= forward.x * 0.1;
      velZ -= forward.z * 0.1;
    }
    if (keys['a']) {
      velX -= right.x * 0.1;
      velZ -= right.z * 0.1;
    }
    if (keys['d']) {
      velX += right.x * 0.1;
      velZ += right.z * 0.1;
    }

    camera.position.x += velX;
    camera.position.z += velZ;

    makeStare(kiki);
    makeStare(genevieve);

    checkLookAtMascots();

    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
